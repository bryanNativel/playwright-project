name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Download and start the website application locally inside the runner
      - name: Clone and Start Practice Software Testing App
        run: |
          git clone https://github.com/testsmith-io/practice-software-testing.git target-app
          cd target-app
          docker compose up -d
          sleep 15

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 2. Tell Playwright to run against the local Docker instance
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:4200

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
